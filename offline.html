<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Aisha — Offline</title>
<link href="https://fonts.googleapis.com/css2?family=Grand+Hotel&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:#111;color:#e8e8e8;font-family:'Inter',sans-serif;overflow:hidden;}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;text-align:center;gap:0;}
.logo{font-family:'Grand Hotel',cursive;font-size:32px;color:#fff;margin-bottom:48px;opacity:.9;}
.icon-wrap{width:96px;height:96px;border-radius:50%;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;margin:0 auto 28px;animation:pulse 2.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,255,255,.12)}50%{box-shadow:0 0 0 18px rgba(255,255,255,0)}}
.wifi-icon{font-size:42px;opacity:.5;}
h1{font-size:22px;font-weight:700;color:#fff;margin-bottom:10px;}
p{font-size:14px;color:rgba(255,255,255,.5);line-height:1.6;max-width:280px;margin:0 auto 36px;}
.retry-btn{background:#fff;color:#111;border:none;border-radius:99px;padding:13px 32px;font-size:15px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;transition:opacity .15s;}
.retry-btn:active{opacity:.8;}
.dots{display:flex;gap:6px;justify-content:center;margin-top:48px;}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.2);animation:blink 1.4s ease-in-out infinite;}
.dot:nth-child(2){animation-delay:.2s;}
.dot:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
</style>
</head>
<body>
<div class="logo">Aisha</div>
<div class="icon-wrap">
  <svg class="wifi-icon" xmlns="http://www.w3.org/2000/svg" height="48" viewBox="0 96 960 960" width="48" fill="rgba(255,255,255,0.5)">

  </svg>
</div>
<h1>You're Offline</h1>
<p>No internet connection found. Check your connection and try again.</p>
<button class="retry-btn" onclick="window.location.reload()">Try again</button>
<div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
</body>
</html>
